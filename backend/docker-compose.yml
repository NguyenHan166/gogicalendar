services:
  mongo:
    image: mongo:8.0
    container_name: gogi-calendar-mongo
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all', '--port', '27017']
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet --eval "try { rs.status().ok } catch (error) { rs.initiate({_id:''rs0'',members:[{_id:0,host:''localhost:27017''}]}).ok }" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

volumes:
  mongo-data:
